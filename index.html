<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Web Mocap Studio</title>
    <link rel="stylesheet" href="style.css">
    
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.150.1/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.150.1/examples/jsm/",
            "kalidokit": "https://unpkg.com/kalidokit@1.1.5/dist/kalidokit.es.js"
        }
    }
    </script>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/holistic/holistic.js" crossorigin="anonymous"></script>
</head>
<body>

    <div id="loading-overlay">
        <div class="loader-content">
            <h2 id="loading-text">Inizializzazione Sistema...</h2>
            <div id="progress-container">
                <div id="progress-bar"></div>
            </div>
            <div id="loading-logs"></div>
        </div>
    </div>

    <div id="app-container">
        <div id="sidebar">
            <div class="header">
                <h2>MOCAP STUDIO</h2>
                <p>Status: <span id="status-indicator" class="status-offline">Waiting</span></p>
            </div>
            
            <div class="control-group">
                <label>Avatar Personalizzato</label>
                <input type="file" id="file-upload" accept=".glb,.gltf,.fbx" style="display:none">
                <button class="btn-primary" onclick="document.getElementById('file-upload').click()">
                    Carica Modello (GLB/FBX)
                </button>
                <p class="hint">Richiede scheletro Mixamo standard in T-Pose.</p>
            </div>

            <div class="camera-preview">
                <p>Input Telecamera</p>
                <div id="video-wrapper">
                    <video id="input_video" autoplay playsinline></video>
                </div>
            </div>
        </div>
        
        <div id="viewport"></div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
