<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Mixamo Web Mocap - FBX & GLB</title>
    <link rel="stylesheet" href="style.css">
    
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.150.1/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.150.1/examples/jsm/",
            "kalidokit": "https://unpkg.com/kalidokit@1.1.5/dist/kalidokit.es.js"
        }
    }
    </script>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/holistic/holistic.js" crossorigin="anonymous"></script>
</head>
<body>

    <div id="ui-panel">
        <input type="file" id="file-upload" accept=".glb,.gltf,.fbx" style="display:none">
        <button onclick="document.getElementById('file-upload').click()">CARICA MODELLO (GLB o FBX)</button>
    </div>

    <div id="video-container">
        <video id="input_video" autoplay playsinline></video>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
